<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Split Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">
    <div class="container vh-100 d-flex align-items-center justify-content-center">
        <div class="card shadow-lg p-4 text-center border-0" style="max-width: 400px; border-radius: 20px;">
            <h3 class="text-primary mb-3 fw-bold">Vivo Split Pro</h3>
            <button onclick="forceSplitSettings()" class="btn btn-primary w-100 py-3 shadow border-0 mb-3" style="background: linear-gradient(45deg, #007bff, #00d4ff); border-radius: 12px;">
                <b>FORCE SPLIT SETTINGS</b>
            </button>
            <hr class="my-4">
            <div class="row">
                <div class="col-6"><button class="btn btn-outline-secondary btn-sm w-100">Display</button></div>
                <div class="col-6"><button class="btn btn-outline-secondary btn-sm w-100">System</button></div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
